[window]
    opacity = 0.8

[env]
WINIT_X11_SCALE_FACTOR = "1.0"

[scrolling]
    history = 20000
    multiplier = 3

[font]
normal      = { family = "MesloLGS Nerd Font Mono", style = "Regular"}
bold        = { family = "MesloLGS Nerd Font Mono", style = "Bold"}
italic      = { family = "MesloLGS Nerd Font Mono", style = "Italic"}
bold_italic = { family = "MesloLGS Nerd Font Mono", style = "Bold Italic"}
size = 10
offset = { x = 0, y = 1}

[colors]
[colors.primary]
background = "#15141b"
foreground = "#edecee"

[colors.cursor]
cursor = "#a277ff"

[colors.selection]
text = "CellForeground"
background = "#29263c"

[colors.normal]
black = "#110f18"
red = "#ff6767"
green = "#61ffca"
yellow = "#ffca85"
blue = "#a277ff"
magenta = "#a277ff"
cyan = "#61ffca"
white = "#edecee"

[colors.bright]
black = "#4d4d4d"
red = "#ff6767"
green = "#61ffca"
yellow = "#ffca85"
blue = "#a277ff"
magenta = "#a277ff"
cyan = "#61ffca"
white = "#edecee"

