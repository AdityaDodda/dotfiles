[window]
    opacity = 0.8

[env]
WINIT_X11_SCALE_FACTOR = "1.0"

[scrolling]
    history = 20000
    multiplier = 3

[font]
normal      = { family = "MesloLGS Nerd Font Mono", style = "Regular"}
bold        = { family = "MesloLGS Nerd Font Mono", style = "Bold"}
italic      = { family = "MesloLGS Nerd Font Mono", style = "Italic"}
bold_italic = { family = "MesloLGS Nerd Font Mono", style = "Bold Italic"}
size = 10
offset = { x = 0, y = 1}

# Default colors
[colors.primary]
background = '#282a36'
foreground = '#f8f8f2'

# Normal colors
[colors.normal]
black   = '#000000'
red     = '#ff5555'
green   = '#50fa7b'
yellow  = '#f1fa8c'
blue    = '#bd93f9'
magenta = '#ff79c6'
cyan    = '#8be9fd'
white   = '#bbbbbb'

# Bright colors
[colors.bright]
black   = '#555555'
red     = '#ff5555'
green   = '#50fa7b'
yellow  = '#f1fa8c'
blue    = '#caa9fa'
magenta = '#ff79c6'
cyan    = '#8be9fd'
white   = '#ffffff'
