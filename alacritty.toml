[window]
    opacity = 0.8

[env]
WINIT_X11_SCALE_FACTOR = "1.0"

[scrolling]
    history = 20000
    multiplier = 3

[font]
normal      = { family = "MesloLGS Nerd Font Mono", style = "Regular"}
bold        = { family = "MesloLGS Nerd Font Mono", style = "Bold"}
italic      = { family = "MesloLGS Nerd Font Mono", style = "Italic"}
bold_italic = { family = "MesloLGS Nerd Font Mono", style = "Bold Italic"}
size = 10
offset = { x = 0, y = 1}

# Default colors
[colors.primary]
    background= '#1a1b26'
    foreground= '#a9b1d6'

  # Normal colors
[colors.normal]
    black= '#414868'
    red= '#f7768e'
    green= '#73daca'
    yellow= '#e0af68'
    blue= '#7aa2f7'
    magenta= '#bb9af7'
    cyan= '#7dcfff'
    white= '#c0caf5'

  # Bright colors
[colors.bright]
    black= '#414868'
    red= '#f7768e'
    green= '#73daca'
    yellow= '#e0af68'
    blue= '#7aa2f7'
    magenta= '#bb9af7'
    cyan= '#7dcfff'
    white= '#c0caf5'
